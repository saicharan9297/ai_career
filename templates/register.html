{% extends "base.html" %}

{% block content %}
<h2 class="mb-4">Register</h2>
<form method="POST">
    <div class="mb-3">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" name="username" required>
    </div>
    <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" name="email" required>
    </div>
    <div class="mb-3">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" required>
    </div>
    <!-- New fields -->
    <div class="mb-3">
        <label for="name" class="form-label">Name</label>
        <input type="text" class="form-control" id="name" name="name" required>
    </div>
    <div class="mb-3">
        <label for="age" class="form-label">Age</label>
        <input type="number" class="form-control" id="age" name="age" min="18" max="30" required>
    </div>
    <div class="mb-3">
        <label for="education" class="form-label">Education</label>
        <select class="form-select" id="education" name="education" required>
            <option value="">Select</option>
            <option value="B.Tech CSE">B.Tech CSE</option>
            <option value="B.Tech ECE">B.Tech ECE</option>
            <option value="B.Tech IT">B.Tech IT</option>
            <option value="B.Tech Mechanical">B.Tech Mechanical</option>
            <option value="M.Tech">M.Tech</option>
        </select>
    </div>
    <div class="mb-3">
        <label for="target_role" class="form-label">Target Job Role</label>
        <input type="text" class="form-control" id="target_role" name="target_role" placeholder="e.g., Software Engineer" required>
    </div>
    <div class="mb-3">
        <label for="prep_time_weeks" class="form-label">Preparation Time (weeks)</label>
        <input type="number" class="form-control" id="prep_time_weeks" name="prep_time_weeks" min="4" max="24" value="8" required>
    </div>
    <button type="submit" class="btn btn-primary">Register</button>
</form>
<p class="mt-3">Already have an account? <a href="{{ url_for('auth.login') }}">Login</a></p>
{% endblock %}
