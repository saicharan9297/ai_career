{% extends "base.html" %}

{% block content %}
<div class="auth-container">
    <div class="auth-card">
        <h2>Create Account</h2>
        <p class="auth-subtitle">Join professionals leveling up with AI.</p>
        
        <form method="POST" action="/register">
            <div class="input-group">
                <label>Username</label>
                <input type="text" name="username" placeholder="Choose a username" required>
            </div>
            
            <div class="input-group">
                <label>Email</label>
                <input type="email" name="email" placeholder="name@example.com" required>
            </div>
            
            <div class="input-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            
            <button type="submit" class="auth-btn signup" style="width: 100%; margin-top: 10px;">Register</button>
        </form>
        
        <p class="auth-footer">Already have an account? <a href="/login">Login</a></p>
    </div>
</div>
{% endblock %}
