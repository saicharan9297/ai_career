{% extends "base.html" %}

{% block content %}
<h2 class="mb-4">Update Your Profile</h2>

<form method="POST" action="{{ url_for('main.profile') }}">
    <div class="mb-3">
        <label for="name" class="form-label">Full Name</label>
        <input type="text" class="form-control" id="name" name="name" 
               value="{{ user.name or user.username }}" required>
    </div>

    <div class="mb-3">
        <label for="age" class="form-label">Age</label>
        <input type="number" class="form-control" id="age" name="age" 
               value="{{ user.age or '' }}" min="18" max="40" required>
    </div>

    <div class="mb-3">
        <label for="education" class="form-label">Education</label>
        <select class="form-select" id="education" name="education" required>
            <option value="">Select your qualification</option>
            <option value="B.Tech CSE" {% if user.education == 'B.Tech CSE' %}selected{% endif %}>B.Tech CSE</option>
            <option value="B.Tech ECE" {% if user.education == 'B.Tech ECE' %}selected{% endif %}>B.Tech ECE</option>
            <option value="B.Tech IT" {% if user.education == 'B.Tech IT' %}selected{% endif %}>B.Tech IT</option>
            <option value="B.Tech Mechanical" {% if user.education == 'B.Tech Mechanical' %}selected{% endif %}>B.Tech Mechanical</option>
            <option value="M.Tech" {% if user.education == 'M.Tech' %}selected{% endif %}>M.Tech</option>
            <option value="B.Sc" {% if user.education == 'B.Sc' %}selected{% endif %}>B.Sc</option>
            <option value="Other" {% if user.education == 'Other' %}selected{% endif %}>Other</option>
        </select>
    </div>

    <div class="mb-3">
        <label for="target_role" class="form-label">Target Job Role</label>
        <input type="text" class="form-control" id="target_role" name="target_role" 
               value="{{ user.target_role or '' }}" placeholder="e.g., Software Engineer, Data Analyst" required>
    </div>

    <div class="mb-3">
        <label for="prep_time_weeks" class="form-label">Preparation Time (in weeks)</label>
        <input type="number" class="form-control" id="prep_time_weeks" name="prep_time_weeks" 
               value="{{ user.prep_time_weeks or 8 }}" min="4" max="52" required>
        <small class="form-text text-muted">How many weeks can you dedicate to preparation?</small>
    </div>

    <button type="submit" class="btn btn-primary btn-lg">Save & Update Profile</button>
</form>

<a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-secondary mt-3">Back to Dashboard</a>
{% endblock %}
